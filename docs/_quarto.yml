project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - whitepaper.qmd
    - remarc-paper.qmd
  resources:
    - CNAME
    - paper/figures/*.png
  pre-render:
    - scripts/ensure-figure-pngs.sh

website:
  title: "Furrballs"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: whitepaper.qmd
        text: Whitepaper
      - href: remarc-paper.qmd
        text: REMARC Paper

format:
  html:
    toc: true
    number-sections: true
    code-fold: false
  pdf:
    toc: true
    number-sections: true
  docx:
    toc: true
    number-sections: true

execute:
  enabled: false
